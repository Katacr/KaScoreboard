# 默认计分板配置
name: "主菜单"
description: "服务器的默认计分板显示"
type: MENU

# 滚动模式: loop（循环滚动）或 clamp（边界停止）
scroll-mode: clamp

# 计分板标题
title:
  update: 5 # 每5tick更新一次
  text:
    - condition: '%player_is_op% == true'   # 如果玩家是管理员
      allow: # 显示达成判断条件的文本
        - "管理员菜单"
      deny: # 显示未达成判断条件的文本
        - "玩家菜单"

# 菜单构建内容（支持PlaceholderAPI变量）
header:
  info1:
    update: -1
    text:
      - condition: '%player_is_op% == true'   # 如果玩家是管理员
        allow: # 显示达成判断条件的文本
          - "你好，欢迎使用菜单"
        deny: # 显示未达成判断条件的文本
          - "玩家你好，欢迎使用菜单"
  info2:
    update: -1
    text: '前所未有的计分板菜单'

footer:
  text1:
    update: -1
    text: '滚轮滚动菜单'
  text2:
    update: -1
    text: '左键选择'
  text3:
    update: -1
    text: '右键返回'


buttons:
  button-1:
    update: -1
    text:
      un-selected: '&7button-1'
      selected: '&abutton-1'
